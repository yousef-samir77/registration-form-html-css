<!DOCTYPE html>
<!-- 
  DOCTYPE tells the browser this is an HTML5 document.
  It must be the very first line.
-->

<html lang="en">
<!-- 
  <html> is the root element of the page.
  lang="en" tells search engines and browsers that the page is in English.
-->

<head>
  <!-- 
    The <head> contains information about the page (metadata) that is not displayed.
    Things like title, character set, links to CSS files, etc. go here.
  -->

  <meta charset="UTF-8">
  <!-- 
    This meta tag sets the character encoding to UTF-8.
    It allows the page to display almost all characters and symbols correctly.
  -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 
    This meta tag makes the page responsive on mobile devices.
    width=device-width sets the page width to follow the device's screen width.
    initial-scale=1.0 sets the initial zoom level when the page loads.
  -->

  <title>Wilderness ·..... registration overlay</title>
  <!-- 
    The <title> appears in the browser tab and is used by search engines.
    It should describe the page content.
  -->

  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- 
    This <link> tag connects to an external CSS file from Font Awesome.
    It gives us access to hundreds of free icons (like the user and lock icons we use later).
    The "href" is the web address of the CSS file.
  -->

  <style>
    /* 
      The <style> tag contains all the CSS (styling) for the page.
      Normally, CSS is placed in a separate .css file, but here it's inside the HTML for simplicity.
      The rules inside define how everything looks: colors, sizes, layout, etc.
    */
    /* === your original CSS (slightly adapted to work with new layout) === */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: url('Registration Background.jpg') no-repeat center/cover;
      /* fallback if image missing: a dark gradient that matches your style */
      background-color: #1a2a3a;
      background-image: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      align-items: center;
      justify-content: flex-end;  /* push form to the right, leaving space for text */
      padding: 0 5%;
      position: relative;
    }

    /* overlay that reproduces the photo's text content */
    .photo-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;  /* so clicks pass through to form if needed */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 4rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    /* top navigation row (matches "LOGO HOME ABOUTUS COURSE PRICING GETSTARTED") */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      pointer-events: auto; /* enable if you want links clickable */
    }
    .top-nav .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-right: auto;
    }
    .top-nav a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.9;
      transition: opacity 0.2s;
    }
    .top-nav a:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .top-nav .get-started {
      background: rgba(255,255,255,0.2);
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* central welcome message (matches "WelcomeToTheWilderness" + lorem) */
    .welcome-message {
      max-width: 600px;
      margin-bottom: 4rem;
    }
    .welcome-message h2 {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: #fff;
    }
    .welcome-message p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.6;
      opacity: 0.9;
      max-width: 500px;
    }

    /* bottom credit (matches "designedby @freepik") */
    .credit {
      font-size: 0.9rem;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    /* === your form styles (unchanged, but wrapper will be placed on the right) === */
    .wrapper {
      width: 420px;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, .2);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 10px rgba(0, 0, 0, .2);
      color: #fff;
      border-radius: 10px;
      padding: 30px 40px;
      position: relative;
      z-index: 10;
      margin: 2rem 0;
    }

    .wrapper h1 {
      font-size: 36px;
      text-align: center;
    }

    .wrapper .input-box {
      position: relative;
      width: 100%;
      height: 50px;
      margin: 30px 0;
    }

    .input-box input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      border: 2px solid rgba(255, 255, 255, .2);
      border-radius: 40px;
      font-size: 16px;
      color: #fff;
      padding: 25px 45px 20px 20px;
    }

    .input-box input::placeholder {
      color: #fff;
    }

    .input-box i {
      position: absolute;
      right: 20px;
      top: 35%;
      transform: translateX(-50%);
      font-size: 20px;
    }

    .wrapper .remember-forgot {
      display: flex;
      justify-content: space-between;
      font-size: 14.5px;
      margin: -15px 0 15px;
    }

    .remember-forgot label input {
      accent-color: #fff;
      margin-right: 3px;
    }

    .remember-forgot a {
      color: #fff;
      text-decoration: none;
    }

    .remember-forgot a:hover {
      text-decoration: underline;
    }

    .wrapper .button {
      width: 100%;
      height: 45px;
      background: #fff;
      border: none;
      outline: none;
      border-radius: 40px;
      box-shadow: 0 0 10px rgba(0, 0, 0, .1);
      cursor: pointer;
      font-size: 16px;
      color: #333;
      font-weight: 600;
    }

    .wrapper .register-link {
      font-size: 14.5px;
      text-align: center;
      margin: 20px 0 15px;
    }

    .register-link p a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link p a:hover {
      text-decoration: underline;
    }

    /* responsive: stack on smaller screens */
    @media (max-width: 1000px) {
      body {
        justify-content: center;
        padding: 1rem;
      }
      .photo-content {
        display: none; /* hide text overlay on narrow screens to avoid clutter */
      }
      .wrapper {
        width: 100%;
        max-width: 420px;
      }
    }
  </style>
  <!-- 
    End of CSS styles. All the rules above control how the page looks.
    In a more advanced project, these styles would be in a separate file.
  -->
</head>

<body>
  <!-- 
    The <body> contains everything that is visible on the page.
    All the content you see (text, images, forms, etc.) goes here.
  -->

  <!-- Overlay that visually reproduces your "Registration Background.jpg" text -->
  <!-- 
    This <div> with class "photo-content" creates a layer on top of the background image.
    It displays the same text that appears in your background image (logo, navigation, welcome message, credit).
    It uses absolute positioning to cover the entire page.
  -->
  <div class="photo-content">
    
    <!-- Top navigation bar with logo and links -->
    <div class="top-nav">
      <!-- 
        The <span> is used for the logo text because it's an inline element – it won't start a new line.
        The class "logo" gives it special styling (bigger, bold).
      -->
      <span class="logo">LOGO</span>
      
      <!-- 
        These are navigation links. The href="#" means they don't go anywhere (placeholder).
        In a real website, you'd replace "#" with actual links like "home.html".
      -->
      <a href="#">HOME</a>
      <a href="#">ABOUTUS</a>
      <a href="#">COURSE</a>
      <a href="#">PRICING</a>
      <!-- 
        The last link has an extra class "get-started" to make it look like a button.
      -->
      <a href="#" class="get-started">GETSTARTED</a>
    </div>

    <!-- Central welcome message -->
    <div class="welcome-message">
      <!-- 
        <h2> is a heading (level 2). It's big and bold.
        The <br> tag creates a line break, so "WelcomeToThe" and "Wilderness" appear on separate lines.
      -->
      <h2>WelcomeToThe<br>Wilderness</h2>
      <!-- 
        <p> is a paragraph. It contains the lorem ipsum placeholder text.
      -->
      <p>Lorem ipsum dolor sit amet, consectetuer adipiscing elit, sed diam nonummy nibh euismod tincidunt ut laoreet dolore</p>
    </div>

    <!-- Bottom credit line -->
    <div class="credit">designed by @freepik</div>
  </div>

  <!-- Your original login form (now positioned on the right side) -->
  <!-- 
    This is the main form container with class "wrapper".
    It has the glass effect and contains all the form elements.
  -->
  <div class="wrapper">
    <h1>Login</h1>
    <!-- 
      <h1> is the main heading of the form. It's styled to be centered and large.
    -->

    <!-- Username/email field with user icon -->
    <div class="input-box">
      <!-- 
        The <input> element creates a text field.
        type="text" means it's a regular text input.
        placeholder shows light text inside before you type.
        required means the form can't be submitted without filling this field.
      -->
      <input type="text" placeholder="Username or email" required>
      <!-- 
        <i> tag from Font Awesome – it displays an icon.
        class="fas fa-user" tells Font Awesome to show a user icon.
      -->
      <i class="fas fa-user"></i>
    </div>

    <!-- Password field with lock icon -->
    <div class="input-box">
      <!-- 
        type="password" hides the characters as you type (dots or asterisks).
      -->
      <input type="password" placeholder="Password" required>
      <i class="fas fa-lock"></i>
    </div>

    <!-- Remember me and forgot password row -->
    <div class="remember-forgot">
      <!-- 
        <label> groups the checkbox and text together – clicking the text also checks the box.
      -->
      <label>
        <input type="checkbox"> Remember me
      </label>
      <!-- 
        Another placeholder link for "Forgot password?".
      -->
      <a href="#">Forgot password?</a>
    </div>

    <!-- Login button -->
    <!-- 
      <button> creates a clickable button.
      type="submit" means it will try to submit the form when clicked.
      class="button" applies styling from CSS.
    -->
    <button type="submit" class="button">Login</button>

    <!-- Register link at the bottom -->
    <div class="register-link">
      <p>Don't have an account? <a href="#">Register</a></p>
      <!-- 
        The <a> tag inside the paragraph is the actual link.
        href="#" is a placeholder.
      -->
    </div>
  </div>

  <!-- 
    End of visible content. The browser will now render everything according to the CSS.
  -->
</body>
</html>
